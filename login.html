<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In · Northern Flow</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="login-mark"><img src="logo.png" alt="Northern Flow" onerror="this.remove(); this.parentElement.textContent='NF';" /></div>
    <h1>Northern Flow</h1>
    <div class="sub">Sign in to manage inventory &amp; sales</div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-accent w-full" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<script type="module">
  import { login, watchAuth } from "./firebase.js";

  // If already signed in, skip straight to the dashboard.
  watchAuth((user) => {
    if (user) window.location.href = "index.html";
  });

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.remove("is-visible");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      await login(email, password);
      window.location.href = "index.html";
    } catch (err) {
      errorBox.textContent = "Couldn't sign in. Check your email and password and try again.";
      errorBox.classList.add("is-visible");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });
</script>

</body>
</html>
